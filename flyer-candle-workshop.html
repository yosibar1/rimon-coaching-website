<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סדנת הכנת נרות - צליל</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c2c2c;
            font-family: 'Heebo', sans-serif;
        }

        .flyer {
            width: 148mm;
            height: 210mm;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 30%, #4a2c6e 60%, #1a0a2e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        /* Stars background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Candle flame glow */
        .glow-top {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 180, 50, 0.3) 0%, rgba(255, 120, 30, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Candle illustration */
        .candle-container {
            margin-top: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .flame {
            width: 20px;
            height: 40px;
            background: linear-gradient(0deg, #ff6b00 0%, #ffb347 40%, #fff4c4 70%, #ffffff 100%);
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
            position: relative;
            animation: flicker 2s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 150, 50, 0.8)) drop-shadow(0 0 40px rgba(255, 100, 20, 0.4));
        }

        .flame::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 12px;
            background: linear-gradient(0deg, #1a0a2e, #4169E1);
            border-radius: 50%;
        }

        @keyframes flicker {
            0%, 100% { transform: scaleX(1) scaleY(1) rotate(-1deg); }
            25% { transform: scaleX(0.9) scaleY(1.05) rotate(1deg); }
            50% { transform: scaleX(1.05) scaleY(0.95) rotate(-0.5deg); }
            75% { transform: scaleX(0.95) scaleY(1.02) rotate(0.5deg); }
        }

        .wick {
            width: 2px;
            height: 10px;
            background: #333;
        }

        .candle-body {
            width: 36px;
            height: 60px;
            background: linear-gradient(90deg, #e8d5b7, #f5e6cc, #e8d5b7);
            border-radius: 3px 3px 5px 5px;
            position: relative;
        }

        .candle-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #d4c0a0, #efe0c8, #d4c0a0);
            border-radius: 50%;
        }

        /* Title area */
        .title-section {
            margin-top: 10px;
            text-align: center;
            z-index: 2;
        }

        .subtitle-top {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #d4a574;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .main-title {
            font-family: 'Secular One', sans-serif;
            font-size: 32px;
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 180, 80, 0.3);
        }

        .main-title .highlight {
            display: block;
            font-size: 26px;
            color: #ffcc80;
            margin-top: 4px;
        }

        .quote {
            margin-top: 12px;
            font-family: 'Secular One', sans-serif;
            font-size: 38px;
            font-weight: 400;
            color: #ffcc80;
            font-style: normal;
            letter-spacing: 2px;
            line-height: 1.2;
            text-align: center;
            z-index: 2;
            text-shadow: 0 0 40px rgba(255, 180, 80, 0.5), 0 0 80px rgba(255, 120, 30, 0.2);
        }

        .quote-mark {
            color: #ffb347;
            font-size: 32px;
        }

        /* Decorative line */
        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            margin: 12px auto;
            position: relative;
        }

        .divider::before {
            content: '✦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4a574;
            font-size: 10px;
            background: #2d1b4e;
            padding: 0 8px;
        }

        /* Details section */
        .details {
            z-index: 2;
            text-align: center;
            padding: 0 25px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 7px;
            font-size: 13px;
            color: #e0d0c0;
        }

        .detail-icon {
            font-size: 16px;
            color: #ffb347;
            width: 24px;
        }

        .description {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 300;
            line-height: 1.8;
            color: #c8b8a8;
            text-align: center;
            padding: 0 20px;
        }

        /* CTA */
        .cta-section {
            margin-top: auto;
            margin-bottom: 15px;
            text-align: center;
            z-index: 2;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 40px;
            border: 1px solid #d4a574;
            border-radius: 30px;
            color: #ffcc80;
            font-family: 'Heebo', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            background: rgba(212, 165, 116, 0.1);
            backdrop-filter: blur(5px);
        }

        .contact-info {
            margin-top: 8px;
            font-size: 13px;
            color: #a89888;
            font-weight: 300;
        }

        .brand {
            margin-top: 8px;
            font-size: 22px;
            font-family: 'Secular One', sans-serif;
            color: #d4a574;
            letter-spacing: 3px;
        }

        .logo-container {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            height: 90px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.2);
        }

        /* Bottom glow */
        .glow-bottom {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 150px;
            background: radial-gradient(ellipse, rgba(255, 180, 80, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Side decorative elements */
        .side-decor {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 60%;
            background: linear-gradient(180deg, transparent, rgba(212, 165, 116, 0.2), transparent);
        }

        .side-decor.left { left: 15px; }
        .side-decor.right { right: 15px; }

        /* Print styles */
        @media print {
            body {
                background: none;
                min-height: auto;
            }
            .flyer {
                box-shadow: none;
            }
            .star { animation: none; opacity: 0.5; }
            .flame { animation: none; }
        }
    </style>
</head>
<body>
    <div class="flyer">
        <!-- Stars -->
        <div class="stars">
            <div class="star" style="top: 5%; left: 10%; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 8%; left: 80%; animation-delay: 1.2s;"></div>
            <div class="star" style="top: 15%; left: 25%; animation-delay: 0.8s;"></div>
            <div class="star" style="top: 12%; left: 65%; animation-delay: 2s;"></div>
            <div class="star" style="top: 20%; left: 90%; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 30%; left: 5%; animation-delay: 0.3s;"></div>
            <div class="star" style="top: 45%; left: 15%; animation-delay: 1.8s;"></div>
            <div class="star" style="top: 50%; left: 85%; animation-delay: 0.7s;"></div>
            <div class="star" style="top: 60%; left: 8%; animation-delay: 2.3s;"></div>
            <div class="star" style="top: 65%; left: 92%; animation-delay: 1.1s;"></div>
            <div class="star" style="top: 75%; left: 20%; animation-delay: 1.6s;"></div>
            <div class="star" style="top: 80%; left: 75%; animation-delay: 0.9s;"></div>
            <div class="star" style="top: 85%; left: 40%; animation-delay: 2.1s;"></div>
            <div class="star" style="top: 90%; left: 60%; animation-delay: 0.4s;"></div>
        </div>

        <!-- Glow effects -->
        <div class="glow-top"></div>
        <div class="glow-bottom"></div>

        <!-- Side decorations -->
        <div class="side-decor left"></div>
        <div class="side-decor right"></div>

        <!-- Candle -->
        <div class="candle-container">
            <div class="flame"></div>
            <div class="wick"></div>
            <div class="candle-body"></div>
        </div>

        <!-- Main Quote - big and prominent -->
        <div class="quote">
            <span class="quote-mark">״</span>
            להדליק את האור הפנימי
            <span class="quote-mark">״</span>
        </div>

        <!-- Title -->
        <div class="title-section">
            <div class="subtitle-top">סדנה מיוחדת</div>
            <h1 class="main-title">
                הכנת נרות
                <span class="highlight">בעבודת יד</span>
            </h1>
        </div>

        <div class="divider"></div>

        <!-- Details -->
        <div class="details">
            <div class="detail-item">
                <span class="detail-icon">📅</span>
                <span>יום שישי | 00.00.0000</span>
            </div>
            <div class="detail-item">
                <span class="detail-icon">🕐</span>
                <span>10:00 - 13:00</span>
            </div>
            <div class="detail-item">
                <span class="detail-icon">📍</span>
                <span>הכתובת שלך כאן</span>
            </div>
            <div class="detail-item">
                <span class="detail-icon">💰</span>
                <span>₪180 כולל חומרים</span>
            </div>
        </div>

        <div class="description">
            סדנה חווייתית ומרגיעה שבה תלמדו ליצור<br>
            נרות ייחודיים בריחות וצבעים לבחירתכם.<br>
            כל משתתף יצור וייקח הביתה נרות מעוצבים.
        </div>

        <!-- CTA -->
        <div class="cta-section">
            <div class="cta-button">להרשמה ופרטים</div>
            <div class="contact-info">054-000-0000</div>
            <div class="brand">צליל</div>
            <div class="logo-container">
                <img src="Rimon Logo.png" alt="לוגו רימון">
            </div>
        </div>
    </div>
</body>
</html>
